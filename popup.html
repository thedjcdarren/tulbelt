<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="header-brand">
        <img class="brand-mark" src="icons/icon32.png" width="26" height="26" alt="" />
        <div class="brand-text">
          <h1>Tulbelt</h1>
          <p class="subtitle">tulip.co tweaks</p>
        </div>
      </div>
      <nav class="header-links" aria-label="GitHub">
        <a
          href="https://github.com/dapomeranz/tulbelt"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="View on GitHub"
        >
          <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
        </a>
        <a
          href="https://github.com/dapomeranz/tulbelt/issues/new/choose"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Report a bug or suggest a feature"
        >
          <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Zm0-8a7 7 0 1 1-3.18 13.23l-2.4.8a.75.75 0 0 1-.93-.93l.8-2.4A7 7 0 0 1 8 1.5Z"
            />
          </svg>
        </a>
      </nav>
    </header>
    <div class="search-bar">
      <input
        type="search"
        id="feature-search"
        placeholder="Search toggles…"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    <ul id="toggles"></ul>
    <p id="no-results" class="no-results" hidden>No matching toggles</p>
    <div id="tooltip" class="tooltip" role="tooltip" hidden></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
